name: Build

on:
    push:
        branches:
            - main
            - next
        tags:
            - v*
    pull_request_target:
        branches:
            - main
            - next
    merge_group:
        branches:
            - main
            - next

permissions:
    actions: read
    checks: write
    contents: read
    deployments: read
    id-token: none
    issues: write
    discussions: none
    packages: none
    pages: none
    pull-requests: write
    repository-projects: none
    security-events: none
    statuses: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  clean: 'false'
                  fetch-depth: '0'
            - name: 🛠️ Setup mise
              uses: jdx/mise-action@v2
              with:
                  install: true
                  cache: true
            - name: ⚙️ Build
              id: build
              run: |
                  mise run build
            - name: 🏺 Publish logs
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: logs
                  path: artifacts/logs/
            - name: 🏺 Publish test data
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: test data
                  path: artifacts/tests/
            - name: 🚀 Publish Test Results
              if: always()
              uses: EnricoMi/publish-unit-test-result-action@v2
              with:
                  files: artifacts/tests/**/*.trx
            - name: 🏺 Publish coverage data
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: coverage
                  path: artifacts/coverage/
            - name: 🚀 Publish Coverage Comment
              if: always() && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
              continue-on-error: true
              uses: marocchino/sticky-pull-request-comment@v2
              with:
                  header: Coverage
                  path: artifacts/coverage/summary/SummaryGithub.md
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - name: 🚀 Publish Codecov Coverage
              if: always() && (github.event_name != 'pull_request' && github.event_name != 'pull_request_target') || ((github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.user.login != 'renovate[bot]' && github.event.pull_request.user.login != 'dependabot[bot]')
              continue-on-error: true
              uses: codecov/codecov-action@v5.5.2
              with:
                  name: actions
                  token: ${{ secrets.CODECOV_TOKEN }}
            - name: 🏺 Publish NuGet Packages
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: nuget
                  path: artifacts/nuget/
